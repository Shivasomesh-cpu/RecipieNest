name: Build and Release APK

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual run from the Actions tab

# Required to give the workflow permission to create a Release and upload the APK
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checks-out your repository so the runner can access your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Sets up the Java Development Kit (JDK) 17 required to build Kotlin/Android
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 3. Gives execution permissions to the Gradle wrapper script
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Compiles the Kotlin code and generates the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Creates/Updates a pre-release tagged "latest" with the new APK
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Debug Build
          draft: false
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
